<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>On-Page vs Technical SEO Demo</title>
<style>
     body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: navy;
        }

    .box{
        background-color: rgba(14, 230, 223, 0.453) ;
        border-radius: 20px;
        padding: 5px;
        border: 2px solid black;
        margin:20px auto;
        text-align: center;
        
    }
    h1{
        background-color: rgba(11, 244, 23, 0.555);
        padding: 5px;
        border-radius: 20px;
        border: 6px solid rgb(0, 0, 0);
        margin: 10px auto;
        size: 50px;
        margin: 10px 0 20px;
    }
    body{
        background-color: brown;
        text-align: center;
    }
    h3{
        background-color: pink;
    }
</style>
</head>
<body>
    <div class="box">
        <h1>On-Page and Technical SEO Example</h1>
<h2>On-Page SEO</h2>
<p>This content uses headings and readable text for users.</p>
<h2>Technical SEO</h2>
<p>This page structure is simple and loads without errors.</p>
</div>

</body>
</html>
